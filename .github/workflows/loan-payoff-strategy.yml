name: loan-payoff-strategy

on:
  push:
    paths:
      - "code/tools/loan-payoff-strategy/**/*"
      - .github/workflows/loan-payoff-strategy.yml
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - ubuntu-24.04
          - ubuntu-22.04
          - macos-15
          - macos-14
      fail-fast: false
    timeout-minutes: 5
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26
      - run: make
        working-directory: code/tools/loan-payoff-strategy
